# Global hotkey format follows pynput.HotKey.parse syntax.
# Examples:
# hotkey = "<ctrl>+<alt>+s"
# hotkey = "<ctrl>+<shift>+a"
hotkey = "<ctrl>+<alt>+s"

# Relative paths are resolved from this project root.
output_dir = "screenshots"

# Pipeline: screenshot file -> local OCR -> GLM text reasoning -> clipboard text.
